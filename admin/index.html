<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>受注管理 - 生コン受注</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#EEF0F3;color:#1A1A1A;min-height:100vh;padding-bottom:40px;font-size:14px}

/* PC向け:画面が広いときは文字を少し大きく */
@media (min-width: 768px){
  body{font-size:16px}
  .card{padding:16px}
  .site-name{font-size:17px !important}
  .company{font-size:13px !important}
  .receipt{font-size:13px !important}
  .info-item{font-size:13px !important}
  .badge-status{font-size:12px !important;padding:5px 11px !important}
  .badge-hikitoiri{font-size:12px !important;padding:4px 9px !important}
  .taiou-mini{font-size:13px !important;padding:3px 10px !important}
  .detail-section{font-size:11px !important}
  .detail-grid{font-size:14px !important}
  .filter-chip{font-size:14px !important;padding:8px 16px !important}
  .toggle-btn{font-size:14px !important;padding:9px !important}
  .stat-val{font-size:26px !important}
  .stat-label{font-size:13px !important}
  .memo-input{font-size:14px !important}
  .btn-save{font-size:13px !important;padding:8px 16px !important}
  .plant-btn{font-size:14px !important;padding:5px 12px !important}
  .modal{max-width:420px !important}
  .modal-title{font-size:17px !important}
  .modal-item{font-size:16px !important;padding:16px !important}
}
.header{background:#06C755;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:17px;font-weight:700;color:#fff}
.header-sub{font-size:11px;color:rgba(255,255,255,0.8);margin-top:1px}
.header-btn{background:rgba(255,255,255,0.2);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.header-btn:active{opacity:.85}
.filter-bar{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #E5E7EA;overflow-x:auto;position:sticky;top:60px;z-index:99}
.filter-chip{padding:6px 14px;border-radius:18px;font-size:12px;font-weight:500;border:1.5px solid #E0E0E0;background:#F7F8FA;color:#555;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.filter-chip.on{background:#06C755;border-color:#06C755;color:#fff}
.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 12px 0}
.stat{background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04)}
.stat-label{font-size:11px;color:#888;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700;color:#1A1A1A}
.stat-val span{font-size:12px;font-weight:400;color:#888;margin-left:2px}
.stat-val.red{color:#E24B4A}
.list{padding:10px 12px}
.empty{text-align:center;padding:60px 0;color:#999;font-size:14px;line-height:1.8}
.card{background:#fff;border:1px solid #DDE1E5;border-radius:12px;padding:14px;margin-bottom:14px;position:relative;box-shadow:0 2px 6px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04)}
.card.open{border-color:#06C755}
.card.done{background:#F7F8FA;opacity:0.85}
.card.highlight{border-color:#FF9800;box-shadow:0 0 0 3px rgba(255,152,0,0.2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.receipt{font-size:11px;color:#888;margin-bottom:2px}
.site-name{font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:2px}
.company{font-size:12px;color:#666}
.timestamp{font-size:10px;color:#999;margin-top:4px}

.badge-status{font-size:10px;padding:4px 9px;border-radius:11px;font-weight:600;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:3px;border:0.5px solid transparent;-webkit-tap-highlight-color:transparent}
.badge-status:active{opacity:.8}
.badge-status.empty{background:#F7F8FA;color:#888;border-color:#E0E0E0}
.badge-status.taiouChu{background:#FAEEDA;color:#854F0B;border-color:#E8C97A}
.badge-status.renraku{background:#E1F5EE;color:#0F6E56;border-color:#A0D8C5}
.badge-status.cancel{background:#FADBDA;color:#9B1F1F;border-color:#E89A98}
/* 旧ステータス互換 */
.badge-status.yoyaku{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.badge-status.kakunin{background:#FAEEDA;color:#854F0B;border-color:#E8C97A}
.badge-status.kakutei{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}
.badge-status.henkou{background:#FEDCBD;color:#854F0B;border-color:#F0B97D}

.badge-hikitoiri{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;background:#EEEDFE;color:#534AB7;margin-left:4px;border:0.5px solid #C0BAE0}
.badge-chev{font-size:9px;opacity:0.7}

.info-row{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;align-items:center}
.info-item{font-size:11px;color:#666;display:flex;align-items:center;gap:3px}

.taiou-mini{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.taiou-mini.set{background:#E6F1FB;color:#1976D2;border:0.5px solid #1976D2}
.taiou-mini.empty{background:#F7F8FA;color:#AAA;border:0.5px solid #E0E0E0}
.taiou-mini:active{opacity:.8}

.detail{margin-top:10px;padding-top:10px;border-top:1px solid #EEE;display:none}
.card.open .detail{display:block}
.detail-section{font-size:10px;color:#06C755;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px;font-weight:700}
.detail-section:first-child{margin-top:0}
.detail-grid{display:grid;grid-template-columns:90px 1fr;gap:5px 12px;font-size:12px;align-items:center}
.detail-label{color:#888}
.detail-val{color:#1A1A1A;font-weight:500}
.remarks{margin-top:4px;padding:8px 10px;background:#F7F8FA;border-radius:6px;font-size:12px;line-height:1.6;white-space:pre-wrap}

/* プラント選択ボタン(クリックでモーダル) */
.plant-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;border:1px solid #E0E0E0;background:#F7F8FA;color:#1A1A1A}
.plant-btn:active{opacity:.85}
.plant-btn.empty{color:#888;font-style:italic}

.memo-wrap{margin-top:4px}
.memo-input{width:100%;min-height:60px;padding:8px 10px;background:#FFFBE6;border:1.5px solid #F5D67A;border-radius:6px;font-size:12px;line-height:1.6;font-family:inherit;resize:vertical;color:#1A1A1A;outline:none}
.memo-input:focus{border-color:#F5C842;background:#FFF8D6}
.memo-input::placeholder{color:#B59F50}
.memo-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:8px}
.memo-status{font-size:10px;color:#999;display:flex;align-items:center;gap:3px}
.memo-status.saved{color:#3B6D11}
.btn-save{padding:6px 14px;background:#06C755;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-save:active{opacity:.85}
.btn-save:disabled{background:#B0DFC0;cursor:not-allowed}

.toggle-btn{width:100%;padding:7px;margin-top:10px;background:#F7F8FA;border:1px solid #E5E7EA;border-radius:7px;font-size:12px;color:#555;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;-webkit-tap-highlight-color:transparent}
.toggle-btn:active{background:#EAEBEE}

.banner{background:#E6F1FB;border-bottom:1px solid #B5D4F4;padding:8px 16px;font-size:12px;color:#185FA5;text-align:center;font-weight:500}

.loading{text-align:center;padding:60px 0;color:#999}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #E5E7EA;border-top-color:#06C755;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;z-index:1000;max-width:90vw}
.toast.on{opacity:1}
.toast.error{background:#C0392B}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.on{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px 16px 16px;max-width:340px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.2);animation:modalIn .15s ease-out;max-height:80vh;display:flex;flex-direction:column}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:14px;text-align:center}
.modal-sub{font-size:11px;color:#888;margin-bottom:12px;text-align:center}
.modal-message{font-size:14px;color:#555;line-height:1.7;margin-bottom:20px}
.modal-list{flex:1;overflow-y:auto;margin:-4px;padding:4px}
.modal-item{padding:14px 14px;margin-bottom:6px;background:#F7F8FA;border:1.5px solid #E5E7EA;border-radius:10px;font-size:15px;font-weight:500;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:space-between;-webkit-tap-highlight-color:transparent}
.modal-item:active{opacity:.85;transform:scale(.99)}
.modal-item:last-child{margin-bottom:0}
.modal-item.current{background:#F0FBF5;border-color:#06C755;color:#06C755;font-weight:700}
.modal-item.current::after{content:"✓";font-size:18px;color:#06C755}
.modal-item.deprecated{opacity:0.6;color:#888;font-size:13px}
.modal-cancel{margin-top:12px;padding:12px;background:#F2F3F5;color:#555;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;width:100%}
.modal-cancel:active{opacity:.85}

.modal-search{margin-bottom:10px}
.modal-search input{width:100%;padding:10px 12px;font-size:14px;color:#1A1A1A;background:#F7F8FA;border:1.5px solid #E5E7EA;border-radius:8px;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.modal-search input:focus{border-color:#06C755;background:#fff}

.modal-buttons{display:flex;gap:10px;margin-top:16px}
.modal-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.modal-btn:active{opacity:.85}
.modal-btn-cancel{background:#F2F3F5;color:#555}
.modal-btn-ok{background:#06C755;color:#fff}

.full-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.7);z-index:1200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.full-overlay.on{display:flex}
.full-overlay-text{font-size:14px;color:#555;font-weight:500}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="full-overlay" id="full-overlay">
  <div class="spinner"></div>
  <div class="full-overlay-text" id="full-overlay-text">処理中...</div>
</div>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-title" id="confirm-title">確認</div>
    <div class="modal-message" id="confirm-message"></div>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="closeConfirm(false)">キャンセル</button>
      <button class="modal-btn modal-btn-ok" id="confirm-ok-btn" onclick="closeConfirm(true)">OK</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <div class="modal-title">ステータスを選択</div>
    <div class="modal-sub" id="status-modal-sub"></div>
    <div class="modal-list" id="status-list"></div>
    <button class="modal-cancel" onclick="closeStatusModal()">キャンセル</button>
  </div>
</div>

<div class="modal-overlay" id="taiou-modal">
  <div class="modal">
    <div class="modal-title">対応者を選択</div>
    <div class="modal-sub" id="taiou-modal-sub"></div>
    <div class="modal-list" id="taiou-list"></div>
    <button class="modal-cancel" onclick="closeTaiouModal()">キャンセル</button>
  </div>
</div>

<div class="modal-overlay" id="plant-modal">
  <div class="modal">
    <div class="modal-title">プラント会社を選択</div>
    <div class="modal-sub" id="plant-modal-sub"></div>
    <div class="modal-search">
      <input type="text" id="plant-search" placeholder="🔍 会社名で検索..." oninput="filterPlants()">
    </div>
    <div class="modal-list" id="plant-list"></div>
    <button class="modal-cancel" onclick="closePlantModal()">キャンセル</button>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="header-icon">📋</div>
    <div>
      <div class="header-title">受注管理</div>
      <div class="header-sub">株式会社 丸紅</div>
    </div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
    <a href="https://chat.line.biz/U091f7b418cb39cea94edc012ad7b4c4d/" target="_blank" rel="noopener" class="header-btn" style="text-decoration:none;display:inline-flex;align-items:center;gap:2px">💬 LINEチャット</a>
    <a href="https://marubeni-shimada.github.io/plant-search/" target="_blank" rel="noopener" class="header-btn" style="text-decoration:none;display:inline-flex;align-items:center;gap:2px">🏭 プラント検索</a>
    <button class="header-btn" onclick="loadList()">🔄 更新</button>
  </div>
</div>

<div class="banner">
  ✏️ ステータス・対応者・メモを編集できます
</div>

<div class="filter-bar" id="filter-bar">
  <div class="filter-chip on" data-filter="all">すべて</div>
  <div class="filter-chip" data-filter="未対応">未対応</div>
  <div class="filter-chip" data-filter="対応中">対応中</div>
  <div class="filter-chip" data-filter="顧客連絡済">顧客連絡済</div>
  <div class="filter-chip" data-filter="キャンセル">キャンセル</div>
  <div class="filter-chip" data-filter="引き取り">引き取り</div>
</div>

<div class="summary">
  <div class="stat">
    <div class="stat-label">全予約</div>
    <div class="stat-val" id="stat-total">-<span>件</span></div>
  </div>
  <div class="stat">
    <div class="stat-label">未対応</div>
    <div class="stat-val red" id="stat-mikakutei">-<span>件</span></div>
  </div>
</div>

<div class="list" id="list">
  <div class="loading">
    <div class="spinner"></div>
    <div>読み込み中...</div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyMc1GHyNYu-YxEGiK5y9D3qCHlB8_f50o1XBdmc8rqa24G3_n_GN4hpK4lQ2BGKXMI/exec";
const TAIOU_LIST = ["松浦", "村上", "小長谷", "川井大輔", "益田桂志", "鈴木悠仁", "青島秀和", "渡邊賢矢"];
// 新ステータス + 旧ステータス互換用
const STATUS_LIST = ["未対応", "対応中", "顧客連絡済", "キャンセル"];
const OLD_STATUS_LIST = ["予約済", "確認中", "確定済", "連絡済", "変更中"];

let allYoyaku = [];
let plantList = [];
let currentFilter = "all";
let highlightReceipt = null;
let currentEditIdx = null;

document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(location.search);
  highlightReceipt = params.get("r");
  
  setupFilter();
  loadList();
  loadPlants();
  
  document.getElementById("status-modal").addEventListener("click", (e) => {
    if (e.target.id === "status-modal") closeStatusModal();
  });
  document.getElementById("taiou-modal").addEventListener("click", (e) => {
    if (e.target.id === "taiou-modal") closeTaiouModal();
  });
  document.getElementById("plant-modal").addEventListener("click", (e) => {
    if (e.target.id === "plant-modal") closePlantModal();
  });
});

function setupFilter() {
  document.querySelectorAll(".filter-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("on"));
      chip.classList.add("on");
      currentFilter = chip.dataset.filter;
      render();
    });
  });
}

async function loadList() {
  const list = document.getElementById("list");
  list.innerHTML = '<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>';
  
  try {
    const res = await fetch(`${GAS_URL}?action=getYoyakuList`);
    const data = await res.json();
    allYoyaku = (data.yoyaku || []).reverse();
    render();
    
    if (highlightReceipt) {
      setTimeout(() => {
        const idx = allYoyaku.findIndex(y => y.receipt === highlightReceipt);
        if (idx >= 0) {
          const card = document.getElementById(`card-${idx}`);
          if (card) {
            card.classList.add("highlight");
            card.classList.add("open");
            // ボタンの表示も「詳細を閉じる」に
            const text = document.getElementById(`toggle-text-${idx}`);
            const icon = document.getElementById(`toggle-icon-${idx}`);
            if (text) text.textContent = "詳細を閉じる";
            if (icon) icon.textContent = "▲";
            card.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        }
      }, 100);
    }
  } catch (err) {
    list.innerHTML = '<div class="empty">読み込みに失敗しました<br>更新ボタンを押してください</div>';
    console.error(err);
  }
}

async function loadPlants() {
  try {
    const res = await fetch(`${GAS_URL}?action=getPlants`);
    const data = await res.json();
    plantList = data.plants || [];
  } catch (err) {
    console.error("プラント取得失敗:", err);
  }
}

function render() {
  const list = document.getElementById("list");
  let filtered = allYoyaku;
  
  if (currentFilter === "引き取り") {
    filtered = allYoyaku.filter(y => isPickup(y));
  } else if (currentFilter === "未対応") {
    // 未対応・予約済(旧)・確認中(旧)・変更中(旧) = 未対応扱い
    filtered = allYoyaku.filter(y => !y.status || y.status === "未対応" || y.status === "予約済" || y.status === "確認中" || y.status === "変更中");
  } else if (currentFilter !== "all") {
    filtered = allYoyaku.filter(y => y.status === currentFilter);
  }
  
  document.getElementById("stat-total").innerHTML = `${allYoyaku.length}<span>件</span>`;
  const mikakutei = allYoyaku.filter(y => 
    !y.status || y.status === "未対応" || y.status === "対応中" || y.status === "予約済" || y.status === "確認中" || y.status === "変更中"
  ).length;
  document.getElementById("stat-mikakutei").innerHTML = `${mikakutei}<span>件</span>`;
  
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">該当する予約がありません</div>';
    return;
  }
  
  list.innerHTML = filtered.map((y, i) => {
    const origIdx = allYoyaku.indexOf(y);
    return buildCard(y, origIdx);
  }).join("");
}

function buildCard(y, idx) {
  const statusClass = `${statusToClass(y.status)}`;
  const isDone = y.status === "顧客連絡済" || y.status === "キャンセル" || y.status === "連絡済";
  const pickup = isPickup(y);
  const dateStr = formatDate(y.deliveryDate);
  const timeStr = formatTime(y.deliveryTime);
  const specTimeStr = formatTime(y.specTime);
  const tsStr = formatTimestamp(y.timestamp);
  const statusLabel = y.status || "未対応";
  
  return `
    <div class="card ${isDone ? 'done' : ''}" id="card-${idx}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="receipt">${esc(y.receipt)}</div>
          <div class="site-name">${esc(y.siteName)}</div>
          <div class="company">${esc(y.company)}</div>
          <div class="timestamp">📥 ${esc(tsStr)}</div>
        </div>
        <div>
          <span class="badge-status ${statusClass}" onclick="openStatusModal(${idx})">
            ${esc(statusLabel)}
            <span class="badge-chev">▼</span>
          </span>
          ${pickup ? '<span class="badge-hikitoiri">引き取り</span>' : ''}
        </div>
      </div>
      
      <div class="info-row">
        <div class="info-item">👤 ${esc(y.staff || '')}</div>
        <span class="taiou-mini ${y.taiousha ? 'set' : 'empty'}" onclick="openTaiouModal(${idx})">
          🎧 ${esc(y.taiousha || '未設定')}
          <span class="badge-chev">▼</span>
        </span>
      </div>
      
      <div class="detail">
        <div class="detail-section">${pickup ? '引き取り情報' : '配送情報'}</div>
        <div class="detail-grid">
          <div class="detail-label">${pickup ? '引き取り希望日' : '配送希望日'}</div>
          <div class="detail-val">📅 ${esc(dateStr)}</div>
          <div class="detail-label">${pickup ? '引き取り時間' : '納入時間'}</div>
          <div class="detail-val">🕐 ${esc(timeStr)}${specTimeStr ? ' ' + esc(specTimeStr) : ''}</div>
        </div>
        
        <div class="detail-section">現場情報</div>
        <div class="detail-grid">
          <div class="detail-label">住所</div>
          <div class="detail-val">${esc(y.address || '-')}</div>
          <div class="detail-label">現場担当</div>
          <div class="detail-val">${esc(y.sitePerson || '-')}</div>
          <div class="detail-label">電話番号</div>
          <div class="detail-val">${esc(y.phone || '-')}</div>
        </div>
        
        <div class="detail-section">${pickup ? '内容' : '配送・施工'}</div>
        <div class="detail-grid">
          ${!pickup && y.vehicle ? `<div class="detail-label">車種</div><div class="detail-val">🚛 ${esc(y.vehicle)}</div>` : ''}
          <div class="detail-label">数量</div>
          <div class="detail-val">${esc(y.quantity || '')} m³</div>
          <div class="detail-label">配合</div>
          <div class="detail-val">${esc(y.mix || '-')}</div>
          ${pickup ? `<div class="detail-label">形状</div><div class="detail-val">${esc(y.shape || '-')}</div>` : ''}
          ${!pickup && y.method ? `<div class="detail-label">打設方法</div><div class="detail-val">${esc(y.method)}</div>` : ''}
          ${!pickup && y.test ? `<div class="detail-label">現場試験</div><div class="detail-val">${esc(y.test)}</div>` : ''}
          ${!pickup && y.testCount ? `<div class="detail-label">テストピース</div><div class="detail-val">${esc(y.testCount)}本</div>` : ''}
          ${!pickup && y.cantab ? `<div class="detail-label">カンタブ</div><div class="detail-val">${esc(y.cantab)}</div>` : ''}
        </div>
        
        <div class="detail-section">プラント</div>
        <div class="detail-grid">
          <div class="detail-label">会社</div>
          <div class="detail-val">
            <span class="plant-btn ${y.plant ? '' : 'empty'}" onclick="openPlantModal(${idx})">
              🏭 ${esc(y.plant || '未設定')}
              <span class="badge-chev">▼</span>
            </span>
          </div>
          <div class="detail-label">連絡先</div>
          <div class="detail-val">${esc(y.plantPhone || '-')}</div>
        </div>
        
        ${y.remarks ? `
          <div class="detail-section">備考(取引先記入)</div>
          <div class="remarks">${esc(y.remarks)}</div>
        ` : ''}
        
        <div class="detail-section">📝 社内メモ</div>
        <div class="memo-wrap">
          <textarea class="memo-input" id="memo-${idx}" placeholder="社内向けのメモを入力(取引先には表示されません)">${esc(y.memo || '')}</textarea>
          <div class="memo-bottom">
            <div class="memo-status" id="memo-status-${idx}"></div>
            <button class="btn-save" onclick="saveMemo(${idx})">💾 社内メモを保存</button>
          </div>
        </div>
      </div>
      
      <button class="toggle-btn" onclick="toggleDetail(${idx})">
        <span id="toggle-text-${idx}">詳細を見る</span>
        <span id="toggle-icon-${idx}">▼</span>
      </button>
    </div>
  `;
}

function toggleDetail(idx) {
  const card = document.getElementById(`card-${idx}`);
  const text = document.getElementById(`toggle-text-${idx}`);
  const icon = document.getElementById(`toggle-icon-${idx}`);
  card.classList.toggle("open");
  if (card.classList.contains("open")) {
    text.textContent = "詳細を閉じる";
    icon.textContent = "▲";
  } else {
    text.textContent = "詳細を見る";
    icon.textContent = "▼";
  }
}

// ステータスモーダル
function openStatusModal(idx) {
  currentEditIdx = idx;
  const y = allYoyaku[idx];
  document.getElementById("status-modal-sub").textContent = `${y.receipt} / ${y.siteName}`;
  
  const listEl = document.getElementById("status-list");
  let html = "";
  // 新ステータス
  STATUS_LIST.forEach(s => {
    html += `<div class="modal-item ${s === y.status ? 'current' : ''}" onclick="selectStatus('${s}')">${s}</div>`;
  });
  // 旧ステータス(現在のステータスが旧の場合のみ表示)
  if (OLD_STATUS_LIST.includes(y.status)) {
    html += `<div class="modal-item current deprecated">${y.status} (旧)</div>`;
  }
  listEl.innerHTML = html;
  
  document.getElementById("status-modal").classList.add("on");
}

function closeStatusModal() {
  document.getElementById("status-modal").classList.remove("on");
  currentEditIdx = null;
}

async function selectStatus(newStatus) {
  const idx = currentEditIdx;
  if (idx === null) return;
  
  const y = allYoyaku[idx];
  closeStatusModal();
  
  if (y.status === newStatus) return;
  
  let confirmMsg;
  confirmMsg = `ステータスを「${newStatus}」に変更しますか?`;
  if (newStatus === "顧客連絡済") {
    confirmMsg = `ステータスを「顧客連絡済」に変更しますか?\n\n担当者(${y.staff})にLINE通知が送信されます。`;
  }
  
  const ok = await customConfirm(confirmMsg);
  if (!ok) return;
  
  showLoading("ステータスを更新中...");
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updateStatus",
        row: y.row,
        status: newStatus,
      }),
    });
    const result = await res.json();
    if (result.status === "ok") {
      allYoyaku[idx].status = newStatus;
      toast(newStatus === "顧客連絡済" ? "顧客連絡済に変更し、担当者へ通知しました" : `「${newStatus}」に変更しました`);
      render();
    } else {
      toast("更新失敗: " + (result.message || "不明"), true);
    }
  } catch (err) {
    toast("通信エラー", true);
    console.error(err);
  } finally {
    hideLoading();
  }
}

// 対応者モーダル
function openTaiouModal(idx) {
  currentEditIdx = idx;
  const y = allYoyaku[idx];
  document.getElementById("taiou-modal-sub").textContent = `${y.receipt} / ${y.siteName}`;

function closeTaiouModal() {

async function selectTaiou(newTaiou) {

// プラントモーダル
function openPlantModal(idx) {
  currentEditIdx = idx;
  const y = allYoyaku[idx];
  document.getElementById("plant-modal-sub").textContent = `${y.receipt} / ${y.siteName}`;
  document.getElementById("plant-search").value = "";
  renderPlantList("");
  document.getElementById("plant-modal").classList.add("on");
}

function renderPlantList(searchText) {
  const idx = currentEditIdx;
  if (idx === null) return;
  const y = allYoyaku[idx];
  const listEl = document.getElementById("plant-list");
  
  if (!plantList.length) {
    listEl.innerHTML = '<div class="empty" style="padding:20px 0">プラント会社が登録されていません</div>';
    return;
  }
  
  const keyword = (searchText || "").toLowerCase().trim();
  const filtered = keyword
    ? plantList.filter(p => String(p).toLowerCase().includes(keyword))
    : plantList;
  
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty" style="padding:20px 0">該当する会社がありません</div>';
    return;
  }
  
  let html = "";
  // 未設定オプションは検索なしの場合のみ表示
  if (!keyword) {
    html += `<div class="modal-item ${!y.plant ? 'current' : ''}" onclick="selectPlant('')">未設定</div>`;
  }
  html += filtered.map(p =>
    `<div class="modal-item ${p === y.plant ? 'current' : ''}" onclick="selectPlant('${p.replace(/'/g, "\\'")}')">${esc(p)}</div>`
  ).join("");
  listEl.innerHTML = html;
}

function filterPlants() {
  const searchText = document.getElementById("plant-search").value;
  renderPlantList(searchText);
}

function closePlantModal() {
  document.getElementById("plant-modal").classList.remove("on");
  currentEditIdx = null;
}

async function selectPlant(newPlant) {
  const idx = currentEditIdx;
  if (idx === null) return;
  
  const y = allYoyaku[idx];
  closePlantModal();
  
  if (y.plant === newPlant) return;
  
  showLoading("プラント会社を更新中...");
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updatePlant",
        row: y.row,
        plant: newPlant,
      }),
    });
    const result = await res.json();
    if (result.status === "ok") {
      allYoyaku[idx].plant = newPlant;
      allYoyaku[idx].plantPhone = result.phone || "";
      toast(newPlant ? `プラント会社を「${newPlant}」に設定` : "プラント会社を解除しました");
      render();
    } else {
      toast("更新失敗: " + (result.message || "不明"), true);
    }
  } catch (err) {
    toast("通信エラー", true);
    console.error(err);
  } finally {
    hideLoading();
  }
}

async function saveMemo(idx) {
  const y = allYoyaku[idx];
  const memo = document.getElementById(`memo-${idx}`).value;
  const statusEl = document.getElementById(`memo-status-${idx}`);
  
  showLoading("社内メモを保存中...");
  statusEl.textContent = "💭 保存中...";
  statusEl.className = "memo-status";
  
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updateMemo",
        row: y.row,
        memo: memo,
      }),
    });
    const result = await res.json();
    if (result.status === "ok") {
      allYoyaku[idx].memo = memo;
      const now = new Date();
      const timeStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      statusEl.textContent = `✓ ${timeStr} に保存`;
      statusEl.className = "memo-status saved";
      toast("社内メモを保存しました");
    } else {
      statusEl.textContent = "❌ 保存失敗";
      toast("保存失敗: " + (result.message || "不明"), true);
    }
  } catch (err) {
    statusEl.textContent = "❌ 保存失敗";
    toast("通信エラー", true);
    console.error(err);
  } finally {
    hideLoading();
  }
}

function showLoading(text) {
  document.getElementById("full-overlay-text").textContent = text || "処理中...";
  document.getElementById("full-overlay").classList.add("on");
}

function hideLoading() {
  document.getElementById("full-overlay").classList.remove("on");
}

let _confirmResolve = null;
function customConfirm(message) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById("confirm-message").textContent = message;
    document.getElementById("confirm-modal").classList.add("on");
  });
}
function closeConfirm(result) {
  document.getElementById("confirm-modal").classList.remove("on");
  if (_confirmResolve) {
    _confirmResolve(result);
    _confirmResolve = null;
  }
}

function statusToClass(status) {
  const map = {
    "未対応":    "empty",
    "対応中":    "taiouChu",
    "顧客連絡済": "renraku",
    "キャンセル": "cancel",
    // 旧
    "予約済":   "yoyaku",
    "確認中":   "kakunin",
    "確定済":   "kakutei",
    "連絡済":   "renraku",
    "変更中":   "henkou",
  };
  return map[status] !== undefined ? map[status] : "empty";
}

function isPickup(y) {
  if (y.pickupType === "引き取り" || y.pickupType === "引取り") return true;
  if (!y.pickupType && !y.vehicle && !y.method && !y.test) return true;
  return false;
}

function formatDate(d) {
  if (!d) return "-";
  try {
    const date = new Date(d);
    if (isNaN(date.getTime())) return String(d);
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    const wd = weekdays[date.getDay()];
    return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} (${wd})`;
  } catch {
    return String(d);
  }
}

// タイムスタンプ整形(M/D HH:MM)
function formatTimestamp(d) {
  if (!d) return "-";
  try {
    const date = new Date(d);
    if (isNaN(date.getTime())) return String(d);
    const m = date.getMonth()+1;
    const day = date.getDate();
    const h = String(date.getHours()).padStart(2,"0");
    const min = String(date.getMinutes()).padStart(2,"0");
    return `${m}/${day} ${h}:${min} 受付`;
  } catch {
    return String(d);
  }
}

function formatTime(t) {
  if (!t) return "";
  if (typeof t === "string" && /^\d{1,2}:\d{2}/.test(t)) return t;
  try {
    const date = new Date(t);
    if (isNaN(date.getTime())) return String(t);
    const h = date.getHours();
    const m = String(date.getMinutes()).padStart(2, "0");
    return `${h}:${m}`;
  } catch {
    return String(t);
  }
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast on" + (isError ? " error" : "");
  setTimeout(() => el.className = "toast" + (isError ? " error" : ""), 2500);
}
